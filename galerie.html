<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie - MAJA Marie Čutková</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        hlavni: '#5c4b38',
                        pozadi: '#faf8f5'
                    },
                    fontFamily: {
                        serif: ['Georgia', 'serif'],
                        sans: ['Segoe UI', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <!-- Lightbox2 CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css">
    
    <style>
        /* Vlastní stylování */
        body {
            font-family: 'Segoe UI', sans-serif;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Georgia', serif;
        }
        
        .transition-smooth {
            transition: all 0.3s ease-in-out;
        }
        
        .image-hover {
            overflow: hidden;
            border-radius: 0.5rem;
        }
        
        .image-hover img {
            transition: transform 0.3s ease-in-out;
        }
        
        .image-hover:hover img {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-pozadi text-stone-800">

    <!-- ============================================
         NAVIGACE (STICKY)
         ============================================ -->
    <nav class="sticky top-0 z-50 bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="text-2xl font-serif font-bold text-hlavni">
                    MAJA
                </div>
                
                <!-- Menu -->
                <div class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-stone-700 transition-smooth hover:text-hlavni">Domů</a>
                    <a href="o-mne.html" class="text-stone-700 transition-smooth hover:text-hlavni">O mně</a>
                    <a href="galerie.html" class="text-hlavni font-semibold transition-smooth hover:text-opacity-70">Galerie</a>
                    <a href="index.html#kurzy" class="text-stone-700 transition-smooth hover:text-hlavni">Kurzy</a>
                    <a href="index.html#kontakt" class="text-stone-700 transition-smooth hover:text-hlavni">Kontakt</a>
                </div>
                
                <!-- Mobile Menu Button -->
                <div class="md:hidden">
                    <button class="text-hlavni text-2xl">☰</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- jQuery pro Lightbox2 -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Lightbox2 JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>
    
    <script>
        // Inicializace Lightbox2
        lightbox.option({
